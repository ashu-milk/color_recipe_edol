<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8a6520">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Couleur">
  <title>Couleur – edol カラーレシピ</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon_192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f7f3ec; }
    #root { height: 100%; }
    #splash { position: fixed; inset: 0; background: #f7f3ec; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash-title { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; letter-spacing: 0.15em; color: #8a6520; margin-top: 16px; }
    #splash-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: #9a8060; letter-spacing: 0.2em; margin-top: 6px; }
    #splash-dots { display: flex; margin-top: 28px; }
    .splash-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(138,101,32,0.3); margin: 0 3px; animation: pulse 1.2s ease-in-out infinite; }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1);} }
    #install-banner { display:none; position:fixed; bottom:80px; left:12px; right:12px; background:#fff8ee; border:1px solid rgba(138,101,32,0.4); border-radius:12px; padding:12px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.12); z-index:500; align-items:center; gap:12px; }
    #install-banner.show { display:flex; }
    #install-banner span { font-family:'Noto Sans JP',sans-serif; font-size:12px; color:#6a5030; flex:1; }
    #install-btn { background:#8a6520; color:#fff; border:none; border-radius:8px; padding:7px 14px; font-family:'Noto Sans JP',sans-serif; font-size:12px; cursor:pointer; white-space:nowrap; }
    #dismiss-btn { background:none; border:none; color:#9a8060; font-size:18px; cursor:pointer; padding:0 4px; }
  </style>
</head>
<body>
  <div id="splash">
    <div style="font-size:52px">🎨</div>
    <div id="splash-title">Couleur</div>
    <div id="splash-sub">edol color recipe</div>
    <div id="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
  <div id="install-banner">
    <span>📱 ホーム画面に追加してオフラインでも使えます</span>
    <button id="install-btn">追加</button>
    <button id="dismiss-btn">✕</button>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- JSXを別ファイルから読み込み -->
  <script type="text/babel" data-plugins="transform-modules-umd" src="./hair-color-app.jsx"></script>

  <!-- 読み込み完了後にマウント -->
  <script>
    window.addEventListener('load', function() {
      // Babelの変換完了を待つ
      function tryMount(attempts) {
        if (typeof App !== 'undefined') {
          const rootEl = document.getElementById('root');
          if (rootEl) {
            ReactDOM.createRoot(rootEl).render(React.createElement(App));
            setTimeout(() => {
              const splash = document.getElementById('splash');
              if (splash) { splash.classList.add('fade-out'); setTimeout(() => splash.remove(), 400); }
            }, 300);
          }
        } else if (attempts > 0) {
          setTimeout(() => tryMount(attempts - 1), 200);
        }
      }
      tryMount(30);
    });

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      const host = location.hostname;
      if (host === 'localhost' || host.endsWith('github.io') || host.endsWith('netlify.app')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('SW registered'))
            .catch(() => {});
        });
      }
    }

    // PWAインストールプロンプト
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      if (!window.matchMedia('(display-mode: standalone)').matches) {
        document.getElementById('install-banner').classList.add('show');
      }
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
    document.getElementById('dismiss-btn').addEventListener('click', () => {
      document.getElementById('install-banner').classList.remove('show');
    });
  </script>
</body>
</html>
