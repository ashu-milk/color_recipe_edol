const SHADE_CATEGORY={};
COLOR_CATEGORIES.filter(c=>c.type==="shade").forEach(cat=>cat.shades.forEach(sh=>{SHADE_CATEGORY[sh]=cat.id;}));
function getRecipeCategories(recipe){
  const cats=new Set();
  recipe.colors.forEach(c=>{const cat=SHADE_CATEGORY[c.shade];if(cat)cats.add(cat);});
  COLOR_CATEGORIES.filter(c=>c.type==="flag").forEach(cat=>{if(cat.match(recipe))cats.add(cat.id);});
  return [...cats];
}
function getCatRecipes(catId,recipes){
  const cat=COLOR_CATEGORIES.find(c=>c.id===catId);
  if(!cat)return[];
  if(cat.type==="flag")return recipes.filter(cat.match);
  return recipes.filter(r=>r.colors.some(c=>cat.shades.includes(c.shade)));
}

const SHADE_HUE={
  // ベースカラー
  B:28, Be:35, Gr:30, Pe:200, WB:22, MT:0, IV:45,
  // シェードカラー
  A:210, M:100, V:270, P:340, R:0, O:25, NV:220,
  WV:275, WA:210, FP:320,
  // プライマリーカラー
  "PR-R":0,"PR-O":20,"PR-M":100,"PR-A":210,"PR-V":270,"PR-P":330,"PR-FP":315,
  // ディープクリアカラー
  "DC-Magenta":320,"DC-Cobalt":220,"DC-PearlGray":200,"DC-SandBeige":35,
  // ライトナー・クリア
  LT:45, "LT-EX":45, "CLR-PX":0,
  // edol yoyo
  "YY-Ash":210,"YY-Violet":270,"YY-Blue":220,"YY-Pink":330,"YY-Magenta":310,
  "YY-Red":0,"YY-Orange":20,"YY-WhiteViolet":280,"YY-SilverGrey":210,
  "YY-BlueViolet":250,"YY-RosePink":340,"YY-CoralPink":350,"YY-Clear":0,
};
function swatchColor(shade,brand){
  if(shade==="YY-Clear")return"rgba(255,255,255,0.15)";
  for(const[k,h]of Object.entries(SHADE_HUE)){
    if(shade===k||shade.startsWith(k+"-")||(shade.match(/^[A-Z]+\d/)&&shade.replace(/\d+$/,"")===k)){
      // levelから明度を推定
      const lv=parseInt(shade.match(/\d+$/)?.[0])||8;
      const isLight=shade.includes("W")||shade.includes("Pe")||shade.includes("IV")||shade.includes("MT");
      const sat=isLight?18:h===0&&shade.startsWith("MT")?0:42;
      const lit=lv>=11?78:lv>=9?65:lv>=7?54:42;
      return`hsl(${h},${sat}%,${lit}%)`;
    }
  }
  return"#888";
}

function GramCalculator({colors,onClose}){
  const [total,setTotal]=useState(60);
  const ratioSum=colors.reduce((s,c)=>s+(+c.ratio||1),0);
  const {ratioStr,pcts}=calcRatio(colors.map(c=>+c.ratio||1));
  const PRESETS=[30,40,50,60,80,100,120,150,200];
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(60,45,20,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>

            <div style={{fontSize:11,color:"#5a4228",marginTop:2}}>比率 <span style={{fontFamily:"'Noto Sans JP',sans-serif",color:"#8a6520",fontSize:14}}>{ratioStr}</span> を維持して必要量を計算</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#5a4228",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {/* 合計量入力 */}

          <div style={{fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:"#8a6520",marginBottom:6}}>必要な合計量</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <input type="range" min={10} max={300} step={5} value={total} onChange={e=>setTotal(+e.target.value)}

            <div style={{display:"flex",alignItems:"baseline",gap:2,flexShrink:0}}>
              <input type="number" min={1} max={999} value={total} onChange={e=>setTotal(+e.target.value)}
                style={{width:60,padding:"4px 8px",textAlign:"right",fontSize:20,fontFamily:"'Noto Sans JP',sans-serif",color:"#8a6520",background:"rgba(138,101,32,0.06)",border:"1px solid rgba(138,101,32,0.4)",borderRadius:7,outline:"none"}}/>

// 数字のみNoto Sans JP、それ以外はCormorant Garamondで表示
function MixedName({name,fontSize,color,style={}}){
  const parts=name.split(/(\d+)/);
  return(
    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize,color,...style}}>
      {parts.map((p,i)=>
        /^\d+$/.test(p)
          ?<span key={i} style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:fontSize*0.9}}>{p}</span>
          :p
      )}
    </span>
  );
}

// ===== 配分比率ヘルパー =====
function calcRatio(amounts) {
  if (!amounts.length) return { ratioStr: "", pcts: [] };
  const nums = amounts.map(a => Math.max(0.01, +a || 0.01));
  const tot = nums.reduce((s, n) => s + n, 0);
  const pcts = nums.map(n => tot ? Math.round((n / tot) * 100) : 0);
  // 最小値で正規化して比率文字列を作る
  const min = Math.min(...nums);
  const normalized = nums.map(n => Math.round((n / min) * 100) / 100);
  // 全部整数に近ければ整数で、そうでなければ小数2桁
  const allInt = normalized.every(v => Math.abs(v - Math.round(v)) < 0.005);
  const fmt = v => allInt ? String(Math.round(v)) : (Number.isInteger(v) ? String(v) : v.toFixed(2).replace(/\.?0+$/, ""));
  return { ratioStr: normalized.map(fmt).join(" : "), pcts };
}

// ===== 画像パネルコンポーネント =====
// slots: after1, after2（Beforeなし）
function ImagePanel({imgAfter1, imgAfter2, onChangeAfter1, onChangeAfter2}) {
  const [urlMode, setUrlMode] = useState({after1:false, after2:false});
  const [urlInput, setUrlInput] = useState({after1:"", after2:""});

  const handleFile = (slot, e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      slot==="after1" ? onChangeAfter1(ev.target.result) : onChangeAfter2(ev.target.result);
    };
    reader.readAsDataURL(file);
  };

  const handleUrl = (slot) => {
    const url = urlInput[slot].trim();
    if (!url) return;
    slot==="after1" ? onChangeAfter1(url) : onChangeAfter2(url);
    setUrlInput(p=>({...p,[slot]:""}));
    setUrlMode(p=>({...p,[slot]:false}));
  };

  const SlotEditor = ({slot, label, img, onChange}) => {
    const isOpen = urlMode[slot];
    return (
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:"#8a6520",marginBottom:6}}>{label}</div>
        {img ? (
          <div style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"3/4",background:"#e8e0d0"}}>
            <img src={img} alt={label} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <button onClick={()=>onChange(null)} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:"rgba(80,50,20,0.7)",border:"none",color:"#f7f3ec",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
          </div>
        ) : (
          <div style={{borderRadius:10,border:"1.5px dashed #c8b890",background:"#f7f3ec",aspectRatio:"3/4",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:12}}>
            {isOpen ? (
              <div style={{width:"100%"}}>
                <input
                  style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #c8b890",background:"#fff",fontSize:11,color:"#2c2416",outline:"none",fontFamily:"'Noto Sans JP',sans-serif",marginBottom:6}}
                  placeholder="画像URLを貼り付け"
                  value={urlInput[slot]}
                  onChange={e=>setUrlInput(p=>({...p,[slot]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&handleUrl(slot)}
                />
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>handleUrl(slot)} style={{flex:1,padding:"5px",borderRadius:6,border:"none",background:"#8a6520",color:"#f7f3ec",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>決定</button>
                  <button onClick={()=>setUrlMode(p=>({...p,[slot]:false}))} style={{padding:"5px 8px",borderRadius:6,border:"1px solid #c8b890",background:"none",fontSize:11,cursor:"pointer",color:"#6a5030"}}>✕</button>
                </div>
              </div>
            ) : (
              <>
                <span style={{fontSize:22,opacity:.35}}>📷</span>
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"6px 12px",borderRadius:7,background:"rgba(138,101,32,0.1)",border:"1px solid rgba(138,101,32,0.3)",color:"#7a5818",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",whiteSpace:"nowrap"}}>
                  端末から選択
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(slot,e)}/>
                </label>
                <button onClick={()=>setUrlMode(p=>({...p,[slot]:true}))} style={{padding:"5px 12px",borderRadius:7,background:"none",border:"1px solid #c8b890",color:"#8a7058",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",whiteSpace:"nowrap"}}>URLを入力</button>
              </>
            )}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{display:"flex",gap:10}}>
      <SlotEditor slot="after1" label="After ①" img={imgAfter1} onChange={onChangeAfter1}/>
      <SlotEditor slot="after2" label="After ②" img={imgAfter2} onChange={onChangeAfter2}/>
    </div>
  );
}

      {(tipsCat?[tipsCat]:TIPS_CATEGORIES).map(cat=>{

        const first = TIPS_DATA.find(t=>t.category===cat);

          <div key={cat} style={{marginBottom:22}}>

            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>

                  {tip.shade&&(
                    <div style={{width:30,height:30,borderRadius:7,background:swatchColor(tip.shade,tip.brand||"edol"),border:"1px solid #d4c9b0",flexShrink:0,marginTop:2}}/>

                    </p>

                {tip.img&&(
                  <div style={{borderRadius:8,overflow:"hidden",border:"1px solid #d4c9b0"}}>

      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"50px 0",color:"#b09878"}}>
          <div style={{fontSize:32,marginBottom:10}}>💡</div>
          <div style={{fontSize:13}}>ポイントが見つかりません</div>
        </div>
      )}
    </div>
  );
}

export default function App(){
  // LocalStorage から読み込み（初回）。なければINITIAL_RECIPESを使用
  const [recipes,setRecipes]=useState(()=>{

      // 容量超過時は画像なしで保存

        const slim=updated.map(r=>({...r,imgAfter1:r.imgAfter1?'[画像あり]':null,imgAfter2:r.imgAfter2?'[画像あり]':null}));

  const [view,setView]=useState("list");

  const [newTag,setNewTag]=useState("");
  const [nb,setNb]=useState({brand:"",line:"",shade:"",amount:"",unit:"g",oxi:"6%",oxiAmount:"",processingTime:"",notes:""});
  const [bleachOpen,setBleachOpen]=useState(false);
  const [showCalc,setShowCalc]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [filterTag]=useState("");

  // ブランドヘルパー
  const colorBrands=useMemo(()=>brands.filter(b=>b.type==="color"),[brands]);
  const bleachBrands=useMemo(()=>brands.filter(b=>b.type==="bleach"),[brands]);
  const getBrand=id=>brands.find(b=>b.id===id);
  const accent=id=>getBrand(id)?.accent||"#8a6520";
  const getLinesOf=bId=>getBrand(bId)?.lines||[];
  const getShadesOf=(bId,lName)=>getLinesOf(bId).find(l=>l.name===lName)?.shades||[];

  const filtered=useMemo(()=>recipes.filter(r=>{
    const q=search.toLowerCase();
    return !q||r.name.toLowerCase().includes(q)||r.clientName.toLowerCase().includes(q)||r.colors.some(c=>c.shade.toLowerCase().includes(q))||r.tags.some(t=>t.includes(q));
  }),[recipes,search]);

  const filteredByCat=useMemo(()=>{
    let base=filterCat
      ?(()=>{const ids=new Set(getCatRecipes(filterCat,recipes).map(r=>r.id));return filtered.filter(r=>ids.has(r.id));})()
      :filtered;
    if(sortOrder==="new")return [...base].sort((a,b)=>b.id-a.id);
    if(sortOrder==="old")return [...base].sort((a,b)=>a.id-b.id);
    if(sortOrder==="kana")return [...base].sort((a,b)=>a.name.localeCompare(b.name,"ja"));
    return base;
  },[filtered,filterCat,recipes,sortOrder]);

  const catCounts=useMemo(()=>{const m={};COLOR_CATEGORIES.forEach(cat=>{m[cat.id]=getCatRecipes(cat.id,recipes).length;});return m;},[recipes]);
  const catRecipes=useMemo(()=>selCat?getCatRecipes(selCat,recipes):[],[recipes,selCat]);
  const selected=recipes.find(r=>r.id===selId);

  const openNew=()=>{
    const firstColor=colorBrands[0];
    const firstLine=firstColor?.lines[0]?.name||"";
    setForm({id:Date.now(),name:"",clientName:"",date:new Date().toISOString().slice(0,10),baseLevel:7,targetLevel:9,bleach:null,colors:[],developer:"6%",developerAmount:60,processingTime:30,technique:"",notes:"",tags:[],stars:4,imgAfter1:null,imgAfter2:null});
    setNc({brand:firstColor?.id||"edol",line:firstLine,shade:"",ratio:1});
    setBleachOpen(false);setView("form");
  };
  const openEdit=r=>{
    setForm({...r,colors:r.colors.map(c=>({...c})),tags:[...r.tags],bleach:r.bleach?{...r.bleach}:null,imgAfter1:r.imgAfter1||null,imgAfter2:r.imgAfter2||null});
    setBleachOpen(!!r.bleach);setView("form");
  };
  const save=()=>{if(!form.name)return;const updated=recipes.find(r=>r.id===form.id)?recipes.map(r=>r.id===form.id?form:r):[form,...recipes];saveRecipes(updated);setSelId(form.id);setView("detail");setForm(null);};
  const del=id=>{const updated=recipes.filter(r=>r.id!==id);saveRecipes(updated);setView("list");};
  const toggleBleach=()=>{if(!bleachOpen){setBleachOpen(true);}else{setForm(f=>({...f,bleach:null}));setBleachOpen(false);}};
  const saveBleach=()=>{if(nb.shade)setForm(f=>({...f,bleach:{...nb}}));};
  const addColor=()=>{if(!nc.shade)return;setForm(f=>({...f,colors:[...f.colors,{...nc}]}));setNc(c=>({...c,shade:"",ratio:1}));};
  const addTag=()=>{if(!newTag||form.tags.includes(newTag))return;setForm(f=>({...f,tags:[...f.tags,newTag]}));};
  const [newTagVal,setNewTagVal]=useState("");
  const addTag2=()=>{if(!newTagVal||form.tags.includes(newTagVal))return;setForm(f=>({...f,tags:[...f.tags,newTagVal]}));setNewTagVal("");};

  const css=`

  const s={

    card:{background:"#fff",border:"1px solid #d4c9b0",borderRadius:12,padding:"15px",cursor:"pointer",transition:"border-color .2s",marginBottom:9,boxShadow:"0 1px 4px rgba(140,110,60,0.07)"},
    lbl:{fontSize:9,letterSpacing:"0.25em",textTransform:"uppercase",color:"#8a6520",display:"block",marginBottom:4},
    inp:{width:"100%",padding:"9px 12px",background:"#fff",border:"1px solid #c8b890",borderRadius:8,fontSize:13,color:"#2c2416",outline:"none",fontFamily:"'Noto Sans JP',sans-serif"},
    sel:{width:"100%",padding:"9px 12px",background:"#fff",border:"1px solid #c8b890",borderRadius:8,fontSize:13,color:"#2c2416",outline:"none",fontFamily:"'Noto Sans JP',sans-serif",cursor:"pointer"},

  };

  const RecipeCard=({r})=>(
    <div style={s.card} onClick={()=>{setSelId(r.id);setView("detail");}} onMouseEnter={e=>e.currentTarget.style.borderColor="#b8a070"} onMouseLeave={e=>e.currentTarget.style.borderColor="#d4c9b0"}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:2}}>
            <div style={{flex:1}}>
              <MixedName name={r.name} fontSize={18} color="#2c2416"/>
            </div>
            {(r.imgAfter1||r.imgAfter2)&&<div style={{width:44,height:58,borderRadius:7,overflow:"hidden",flexShrink:0,border:"1px solid #d4c9b0"}}><img src={r.imgAfter1||r.imgAfter2} alt="After" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
          </div>
          <div style={{fontSize:11,color:"#6a5030",marginBottom:7}}>{r.clientName} · {r.date}</div>
          {r.bleach&&<div style={{marginBottom:7}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:`${accent(r.bleach.brand)}18`,border:`1px solid ${accent(r.bleach.brand)}40`,color:accent(r.bleach.brand)}}>✂ {getBrand(r.bleach.brand)?.label||r.bleach.brand}</span></div>}
          {(()=>{
            const tot=r.colors.reduce((s,c)=>s+(+c.ratio||1),0); // ratio sum

  const DataManagementView = () => {
    const [exportMsg, setExportMsg] = React.useState(null);
    const [importMsg, setImportMsg] = React.useState(null);

    const handleExport = async () => {
      try {
        const data = { version: 1, exportedAt: new Date().toISOString(), recipes };
        const json = JSON.stringify(data, null, 2);
        const now = new Date();
        const ymd = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
        const filename = `couleur_backup_${ymd}.json`;
        try {
          const blob = new Blob([json], {type:'application/json'});
          const file = new File([blob], filename, {type:'application/json'});
          if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            await navigator.share({files:[file], title:'Couleurバックアップ'});
            setExportMsg('✅ ' + recipes.length + '件をエクスポートしました');
            setTimeout(() => setExportMsg(null), 3000);
            return;
          }
        } catch(e) { if (e.name === 'AbortError') return; }
        try {
          const blob = new Blob([json], {type:'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
          setExportMsg('✅ ' + recipes.length + '件をエクスポートしました');
          setTimeout(() => setExportMsg(null), 3000);
          return;
        } catch(e) {}
        await navigator.clipboard.writeText(json);
        setExportMsg('📋 クリップボードにコピーしました（メモ帳等に貼り付けて保存）');
        setTimeout(() => setExportMsg(null), 6000);
      } catch(e) {
        setExportMsg('❌ エクスポートに失敗しました');
        setTimeout(() => setExportMsg(null), 3000);
      }
    };

    const handleImport = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          const imported = parsed.recipes || parsed;
          if (!Array.isArray(imported)) throw new Error('不正なフォーマット');
          const existingIds = new Set(recipes.map(r => r.id));
          const newOnes = imported.filter(r => !existingIds.has(r.id));
          saveRecipes([...recipes, ...newOnes]);
          setImportMsg('✅ ' + newOnes.length + '件を追加しました（重複スキップ: ' + (imported.length - newOnes.length) + '件）');
          setTimeout(() => setImportMsg(null), 4000);
        } catch(err) {
          setImportMsg('❌ ファイルの読み込みに失敗しました');
          setTimeout(() => setImportMsg(null), 3000);
        }
      };
      reader.readAsText(file, 'utf-8');
      e.target.value = '';
    };

    const card = {background:'#fff', border:'1px solid rgba(201,168,76,0.3)', borderRadius:14, padding:'20px 18px', marginBottom:16};
    const btn = {display:'block', width:'100%', padding:'13px', borderRadius:10, border:'1px solid rgba(138,101,32,0.5)', background:'#8a6520', color:'#fff', fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, fontWeight:500, cursor:'pointer', textAlign:'center'};
    const desc = {fontSize:11, color:'#9a8060', lineHeight:1.7, marginTop:8, fontFamily:"'Noto Sans JP',sans-serif"};
    const msgOk = {marginTop:10, padding:'8px 12px', borderRadius:8, background:'#f0faf0', color:'#2a7a2a', fontSize:12, fontFamily:"'Noto Sans JP',sans-serif"};
    const msgNg = {marginTop:10, padding:'8px 12px', borderRadius:8, background:'#fff0f0', color:'#c02020', fontSize:12, fontFamily:"'Noto Sans JP',sans-serif"};

    return (
      <div style={{padding:'16px 16px 100px'}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif", fontSize:22, fontWeight:300, letterSpacing:'0.12em', color:'#7a5818', marginBottom:20, paddingTop:4}}>Data Management</div>
        <div style={card}>
          <div style={{fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:500, color:'#5a3e10', marginBottom:12}}>📤 エクスポート</div>
          <button style={btn} onClick={handleExport}>バックアップファイルを作成</button>
          <p style={desc}>現在保存されているレシピ（{recipes.length}件）をJSONファイルとして書き出します。機種変更や端末間の共有にご利用ください。</p>
          {exportMsg && <div style={exportMsg.startsWith('✅') ? msgOk : msgNg}>{exportMsg}</div>}
        </div>
        <div style={card}>
          <div style={{fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:500, color:'#5a3e10', marginBottom:12}}>📥 インポート</div>
          <label style={btn}>バックアップファイルを読み込む<input type="file" accept=".json,application/json" onChange={handleImport} style={{display:'none'}}/></label>
          <p style={desc}>以前エクスポートしたJSONファイルを選択してください。既存のレシピは残したまま新しいレシピのみ追加します。</p>
          {importMsg && <div style={importMsg.startsWith('✅') ? msgOk : msgNg}>{importMsg}</div>}
        </div>
        <div style={{...card, background:'rgba(247,243,236,0.6)'}}>
          <div style={{fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:500, color:'#5a3e10', marginBottom:10}}>💾 保存状況</div>
          <div style={{fontFamily:"'Noto Sans JP',sans-serif", fontSize:12, color:'#7a6040', lineHeight:2}}>
            <div>保存レシピ数：<strong>{recipes.length}</strong> 件</div>
            <div>保存場所：端末のブラウザ（localStorage）</div>
            <div style={{fontSize:11, color:'#9a8060', marginTop:4}}>※定期的なバックアップをおすすめします。</div>
          </div>
        </div>
      </div>
    );
  };

  const tabs=[{id:"list",label:"レシピ",icon:"📋"},{id:"category",label:"色味",icon:"🎨"},{id:"tips",label:"ポイント",icon:"💡"},{id:"data",label:"データ管理",icon:"🗂️"}];
  const activeTab=["list","detail","form"].includes(view)?"list":["category","catDetail"].includes(view)?"category":["tips"].includes(view)?"tips":view==="data"?"data":"list";

  return(
    <div style={s.app}>
      <style>{css}</style>
      {showCalc&&<GramCalculator colors={view==="form"&&form?form.colors:selected?.colors||[]} onClose={()=>setShowCalc(false)}/>}

      <div style={s.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={s.logo}>Couleur</div><div style={s.logoSub}>edol Formula Book</div></div>
          <div style={{display:"flex",gap:8,alignItems:"center",paddingTop:4}}>
            {view==="list"&&(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{fontSize:11,color:"#6a5030"}}>{filteredByCat.length} レシピ</div>
                <div style={{display:"flex",gap:3}}>
                  {[{v:"new",l:"新しい順"},{v:"old",l:"登録順"},{v:"kana",l:"五十音順"}].map(({v,l})=>(
                    <button key={v} onClick={()=>setSortOrder(v)} style={{padding:"2px 8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:10,fontFamily:"'Noto Sans JP',sans-serif",background:sortOrder===v?"rgba(138,101,32,0.18)":"rgba(138,101,32,0.05)",color:sortOrder===v?"#7a5818":"#9a8060"}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <button onClick={()=>setShowSettings(true)} style={{background:"rgba(138,101,32,0.07)",border:"1px solid #c8b890",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,color:"#6a5030",fontFamily:"'Noto Sans JP',sans-serif"}}>⚙ 編集</button>
          </div>
        </div>
        {view==="list"&&<input style={s.search} placeholder="レシピ名・お客様名・色名で検索..." value={search} onChange={e=>setSearch(e.target.value)}/>}
      </div>

      <div style={{padding:"16px 16px 80px",maxWidth:600,margin:"0 auto"}}>

        {/* ========== LIST ========== */}
        {view==="list"&&<>
          <button style={s.addBtn} onClick={openNew}>＋ 新しいレシピを追加</button>
          {/* カテゴリーフィルター 3列グリッド */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
            <button onClick={()=>setFilterCat("")} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"7px 6px",borderRadius:10,cursor:"pointer",border:"none",background:filterCat===""?"rgba(201,168,76,0.65)":"rgba(255,255,255,0.04)",outline:`1px solid ${filterCat===""?"rgba(201,168,76,0.75)":"rgba(255,255,255,0.09)"}`,color:filterCat===""?"#8a6520":"rgba(232,221,208,0.65)",fontSize:11,fontFamily:"'Noto Sans JP',sans-serif"}}>すべて</button>
            {COLOR_CATEGORIES.map(cat=>(
              <button key={cat.id} onClick={()=>setFilterCat(filterCat===cat.id?"":cat.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"8px 4px 7px",borderRadius:10,cursor:"pointer",border:"none",background:filterCat===cat.id?`${cat.color}22`:"rgba(255,255,255,0.04)",outline:`1px solid ${filterCat===cat.id?cat.color+"65":"rgba(255,255,255,0.09)"}`,color:filterCat===cat.id?cat.color:"#6a5030",fontFamily:"'Noto Sans JP',sans-serif",position:"relative",overflow:"hidden"}}>
                {filterCat===cat.id&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:cat.grad}}/>}
                <span style={{fontSize:16}}>{cat.emoji}</span>
                <span style={{fontSize:10,lineHeight:1.3,textAlign:"center"}}>{cat.label}</span>
                <span style={{fontSize:9,opacity:.55}}>({catCounts[cat.id]||0})</span>
              </button>
            ))}
          </div>
          {filteredByCat.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#6a5030"}}><div style={{fontSize:36,marginBottom:10}}>✦</div><div style={{fontSize:13}}>レシピが見つかりません</div></div>}
          {filteredByCat.map(r=><RecipeCard key={r.id} r={r}/>)}
        </>}

        {/* ========== CATEGORY GRID ========== */}
        {view==="category"&&<>
          <div style={{fontSize:9,letterSpacing:"0.25em",textTransform:"uppercase",color:"#8a6520",marginBottom:8,marginTop:2}}>色味で探す</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {COLOR_CATEGORIES.filter(c=>c.type==="shade").map(cat=>{
              const count=catCounts[cat.id]||0;
              const usedShades=new Set();recipes.forEach(r=>r.colors.forEach(c=>{if(cat.shades&&cat.shades.includes(c.shade))usedShades.add(c.shade);}));
              return(
                <div key={cat.id} onClick={()=>{setSelCat(cat.id);setView("catDetail");}} style={{background:"#f0ebe0",border:`1px solid ${cat.color}35`,borderRadius:14,padding:"14px 13px",cursor:"pointer",transition:"all .2s",position:"relative",overflow:"hidden"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=cat.color+"80";e.currentTarget.style.background=`${cat.color}18`;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=cat.color+"35";e.currentTarget.style.background="#fff";}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:cat.grad}}/>
                  <div style={{fontSize:22,marginBottom:5}}>{cat.emoji}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"#2c2416",marginBottom:3,lineHeight:1.3}}>{cat.label}</div>
                  <div style={{fontSize:10,color:"#6a5030",lineHeight:1.5,marginBottom:8}}>{cat.desc}</div>
                  <div style={{display:"flex",gap:3,marginBottom:7}}>{[...usedShades].slice(0,4).map(sh=><Swatch key={sh} shade={sh} brand={sh.startsWith("YY-")?"edol yoyo":"edol"} size={14}/>)}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:10,color:cat.color}}>{count} レシピ</span>{count===0&&<span style={{fontSize:9,color:"#6a5030"}}>まだなし</span>}</div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:9,letterSpacing:"0.25em",textTransform:"uppercase",color:"#8a6520",marginBottom:8}}>施術タイプで探す</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {COLOR_CATEGORIES.filter(c=>c.type==="flag").map(cat=>{
              const count=catCounts[cat.id]||0;
              return(
                <div key={cat.id} onClick={()=>{setSelCat(cat.id);setView("catDetail");}} style={{background:"#f0ebe0",border:`1px solid ${cat.color}35`,borderRadius:12,padding:"13px 16px",cursor:"pointer",transition:"all .2s",position:"relative",overflow:"hidden",display:"flex",alignItems:"center",gap:14}} onMouseEnter={e=>{e.currentTarget.style.borderColor=cat.color+"80";e.currentTarget.style.background=`${cat.color}18`;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=cat.color+"35";e.currentTarget.style.background="#fff";}}>
                  <div style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:cat.grad}}/>
                  <div style={{fontSize:22,marginLeft:6}}>{cat.emoji}</div>
                  <div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#2c2416",marginBottom:2}}>{cat.label}</div><div style={{fontSize:10,color:"#6a5030"}}>{cat.desc}</div></div>
                  <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:16,fontFamily:"'Noto Sans JP',sans-serif",color:cat.color}}>{count}</div><div style={{fontSize:9,color:"#6a5030"}}>レシピ</div></div>
                </div>
              );
            })}
          </div>
        </>}

        {/* ========== CAT DETAIL ========== */}
        {view==="catDetail"&&selCat&&(()=>{
          const cat=COLOR_CATEGORIES.find(c=>c.id===selCat);if(!cat)return null;
          return<>
            <button style={s.back} onClick={()=>setView("category")}>← 色味一覧に戻る</button>
            <div style={{borderRadius:14,padding:"20px 18px",marginBottom:16,position:"relative",overflow:"hidden",background:`linear-gradient(135deg,${cat.color}18,${cat.color}08)`,border:`1px solid ${cat.color}40`}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:cat.grad}}/>
              <div style={{fontSize:32,marginBottom:8}}>{cat.emoji}</div>
              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:"#2c2416",marginBottom:4}}>{cat.label}</h2>
              <p style={{fontSize:12,color:"#6a5030",lineHeight:1.7,marginBottom:12}}>{cat.desc}</p>
              {cat.type==="shade"&&cat.shades&&<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{cat.shades.map(sh=><div key={sh} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:10,background:"rgba(138,101,32,0.06)",border:"1px solid #d0c4a8",fontSize:10,color:"#2e2010"}}><Swatch shade={sh} brand={sh.startsWith("YY-")?"edol yoyo":"edol"} size={12}/>{sh}</div>)}</div>}
            </div>
            {catRecipes.length===0?(<div style={{textAlign:"center",padding:"40px 0",color:"#6a5030"}}><div style={{fontSize:30,marginBottom:8}}>{cat.emoji}</div><div style={{fontSize:13,marginBottom:4}}>このカテゴリーのレシピはまだありません</div><button style={{...s.act,marginTop:8,fontSize:11}} onClick={()=>setView("list")}>レシピを追加 →</button></div>):(<><div style={{fontSize:10,letterSpacing:"0.2em",color:`${cat.color}99`,textTransform:"uppercase",marginBottom:10}}>{catRecipes.length} レシピ</div>{catRecipes.map(r=><RecipeCard key={r.id} r={r}/>)}</>)}
          </>;
        })()}

        {/* ========== DETAIL ========== */}
        {view==="detail"&&selected&&<>
          <button style={s.back} onClick={()=>{if(selCat&&catRecipes.find(r=>r.id===selId))setView("catDetail");else setView("list");}}>← 戻る</button>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
            <div>
              <MixedName name={selected.name} fontSize={28} color="#2c2416" style={{lineHeight:1.2,display:"block"}}/>
              <div style={{fontSize:14,color:"#6a5030",marginTop:4}}>{selected.clientName} · {selected.date}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
                {getRecipeCategories(selected).map(cid=>{const cat=COLOR_CATEGORIES.find(c=>c.id===cid);return cat?(<span key={cid} onClick={()=>{setSelCat(cid);setView("catDetail");}} style={{fontSize:13,padding:"3px 10px",borderRadius:12,background:`${cat.color}20`,border:`1px solid ${cat.color}50`,color:cat.color,cursor:"pointer"}}>{cat.emoji} {cat.label}</span>):null;})}
              </div>
            </div>
            <Stars value={selected.stars||0}/>
          </div>

          <div style={{...s.dc,display:"flex",alignItems:"center",justifyContent:"center",gap:14,padding:"18px"}}>
            <div style={{textAlign:"center"}}><div style={s.lbl}>BASE</div><LevelDot level={selected.baseLevel}/><div style={{fontSize:11,color:"#8a7058",marginTop:3}}>{selected.baseLevel<=13?`Lv.${selected.baseLevel}`:`B${selected.baseLevel-13}（ブリーチ）`}</div></div>
            <div style={{flex:1,height:2,background:"linear-gradient(90deg,rgba(201,168,76,0.65),rgba(201,168,76,0.55),rgba(201,168,76,0.65))"}}/>
            <div style={{textAlign:"center"}}><div style={s.lbl}>TARGET</div><LevelDot level={selected.targetLevel}/><div style={{fontSize:11,color:"#8a7058",marginTop:3}}>{selected.targetLevel<=13?`Lv.${selected.targetLevel}`:`B${selected.targetLevel-13}（ブリーチ）`}</div></div>
          </div>

          {selected.bleach&&(()=>{const b=getBrand(selected.bleach.brand)||{accent:"#4a9fd4",label:selected.bleach.brand,sublabel:""};return(
            <div style={{...s.dc,border:`1px solid ${b.accent}35`,background:`${b.accent}08`}}>
              <div style={{...s.lbl,color:`${b.accent}99`}}>ブリーチ</div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:28,height:28,borderRadius:6,background:b.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:600,flexShrink:0}}>B</div><div><div style={{fontSize:14,color:b.accent}}>{b.label}</div><div style={{fontSize:12,color:"#6a5030"}}>{b.sublabel}</div></div></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:12,fontSize:14}}>
                <div><span style={{fontSize:12,color:"#6a5030"}}>ライン </span><span>{selected.bleach.line}</span></div>
                <div><span style={{fontSize:12,color:"#6a5030"}}>量 </span><span style={{color:b.accent,fontFamily:"'Noto Sans JP',sans-serif",fontSize:16}}>{selected.bleach.amount}{selected.bleach.unit}</span></div>
                <div><span style={{fontSize:12,color:"#6a5030"}}>オキシ </span><span style={{color:b.accent}}>{selected.bleach.oxi} · {selected.bleach.oxiAmount}ml</span></div>
                <div><span style={{fontSize:12,color:"#6a5030"}}>放置 </span><span style={{color:b.accent}}>{selected.bleach.processingTime}分</span></div>
              </div>
              {selected.bleach.notes&&<p style={{fontSize:13,color:"#6a5030",marginTop:8,lineHeight:1.7}}>{selected.bleach.notes}</p>}
            </div>
          );})()}

          {(()=>{
            const {ratioStr,pcts}=calcRatio(selected.colors.map(c=>+c.ratio||1));
            const updateRatio=(idx,val)=>{
              const updated=selected.colors.map((c,i)=>i===idx?{...c,ratio:Math.max(0.01,Math.round((+val||0.01)*100)/100)}:c);
              setRecipes(recipes.map(r=>r.id===selected.id?{...r,colors:updated}:r));
            };
            return(
            <div style={s.dc}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={s.lbl}>オンカラー</div>
                {selected.colors.length>0&&(
                  <button onClick={()=>setShowCalc(true)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",borderRadius:8,cursor:"pointer",border:"1px solid rgba(138,101,32,0.4)",background:"rgba(138,101,32,0.07)",color:"#8a6520",fontSize:13,fontFamily:"'Noto Sans JP',sans-serif"}}>
                    ⚖ グラム計算
                  </button>
                )}
              </div>

              {/* 配分比率サマリーボックス */}
              {selected.colors.length>0&&(
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:14,padding:"10px 14px",borderRadius:10,background:"rgba(138,101,32,0.06)",border:"1px solid rgba(138,101,32,0.25)"}}>
                  <span style={{fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:"#8a6520",marginRight:4}}>配分比</span>
                  {selected.colors.map((c,i)=>(
                    <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4}}>
                      {i>0&&<span style={{color:"#8a7058",fontSize:18,lineHeight:1,margin:"0 2px"}}>:</span>}
                      <Swatch shade={c.shade} brand={c.brand} size={12}/>
                      <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:20,color:"#2c2416",lineHeight:1}}>{+c.ratio||1}</span>
                      <span style={{fontSize:11,color:"#8a7058"}}>({pcts[i]}%)</span>
                    </span>
                  ))}
                  {selected.colors.length>1&&(
                    <span style={{marginLeft:"auto",fontFamily:"'Noto Sans JP',sans-serif",fontSize:14,color:"#8a6520"}}>= {ratioStr}</span>
                  )}
                </div>
              )}

              {/* 各色カード（比率スライダー付き） */}
              {selected.colors.map((c,i)=>{
                const pct=pcts[i]||0;
                return(
                  <div key={i} style={{marginBottom:8,padding:"10px 12px",borderRadius:10,background:`${accent(c.brand)}08`,border:`1px solid ${accent(c.brand)}25`}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <Swatch shade={c.shade} brand={c.brand} size={22}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,color:accent(c.brand),marginBottom:1}}>{c.brand} · {c.line}</div>
                        <div style={{fontSize:15,color:"#2c2416"}}>{c.shade}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:12,color:"#6a5030",marginBottom:3}}>{pct}%</div>
                        {/* 比率数値入力（主役） */}
                        <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                          <span style={{fontSize:11,color:"#8a7058"}}>比率</span>
                          <input type="number" min={0.01} max={99} step={0.01}
                            value={+c.ratio||1}
                            onChange={e=>updateRatio(i,e.target.value)}
                            style={{width:44,padding:"2px 5px",textAlign:"center",fontSize:20,fontFamily:"'Noto Sans JP',sans-serif",color:"#8a6520",background:"rgba(138,101,32,0.06)",border:"1px solid rgba(138,101,32,0.4)",borderRadius:6,outline:"none"}}/>
                        </div>
                      </div>
                    </div>
                    {/* 比率スライダー */}
                    <input type="range" min={0.01} max={20} step={0.01}
                      value={Math.min(+c.ratio||0.01,20)}
                      onChange={e=>updateRatio(i,e.target.value)}
                      style={{width:"100%",accentColor:swatchColor(c.shade,c.brand)}}/>
                  </div>
                );
              })}

              <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:10,display:"flex",flexWrap:"wrap",gap:14}}>
                {selected.developer!=="なし（塩基性）"&&<div><span style={{fontSize:12,color:"#6a5030"}}>オキシ </span><span style={{color:"#8a6520"}}>{selected.developer} · {selected.developerAmount}ml</span></div>}
                <div><span style={{fontSize:12,color:"#6a5030"}}>放置 </span><span style={{color:"#8a6520"}}>{selected.processingTime}分</span></div>
                {selected.technique&&<div><span style={{fontSize:12,color:"#6a5030"}}>手法 </span><span style={{color:"#8a6520"}}>{selected.technique}</span></div>}
              </div>
            </div>
            );
          })()}

          {/* After 画像 */}
          {(selected.imgAfter1||selected.imgAfter2)&&(
            <div style={s.dc}>
              <div style={s.lbl}>After</div>
              <div style={{display:"flex",gap:10}}>
                {[{key:"imgAfter1",label:"After ①"},{key:"imgAfter2",label:"After ②"}].map(({key,label})=>{
                  const img=selected[key];
                  if(!img)return null;
                  return(
                    <div key={key} style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:"#8a7058",marginBottom:5}}>{label}</div>
                      <div style={{borderRadius:10,overflow:"hidden",aspectRatio:"3/4",background:"#e8e0d0"}}>
                        <img src={img} alt={label} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {selected.notes&&<div style={s.dc}><div style={s.lbl}>メモ</div><p style={{fontSize:14,lineHeight:1.9,color:"#2e2010",whiteSpace:"pre-line"}}>{selected.notes}</p></div>}
          {selected.tags.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{selected.tags.map(t=><Tag key={t} label={t}/>)}</div>}
          <div style={{display:"flex",gap:10}}>
            <button style={{...s.act,flex:1}} onClick={()=>openEdit(selected)}>編集する</button>
            <button style={{...s.act,flex:1,color:"rgba(220,80,80,0.65)",borderColor:"rgba(220,80,80,0.2)",background:"rgba(220,80,80,0.05)"}} onClick={()=>del(selected.id)}>削除する</button>
          </div>
        </>}

        {/* ========== FORM ========== */}
        {view==="form"&&form&&<>
          <button style={s.back} onClick={()=>{setView(selId?"detail":"list");setForm(null);}}>← キャンセル</button>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,marginBottom:18,color:"#2c2416"}}>{recipes.find(r=>r.id===form.id)?"レシピを編集":"新しいレシピ"}</h2>

          <div style={{marginBottom:12}}><label style={s.lbl}>レシピ名</label><input style={s.inp} placeholder="例：アッシュベージュ" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <div style={{flex:1}}><label style={s.lbl}>お客様名</label><input style={s.inp} placeholder="田中 美咲" value={form.clientName} onChange={e=>setForm(p=>({...p,clientName:e.target.value}))}/></div>
            <div style={{flex:1}}><label style={s.lbl}>施術日</label><input type="date" style={s.inp} value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:12}}><label style={s.lbl}>テクニック</label><input style={s.inp} placeholder="全体カラー・ハイライト・ブリーチ後オンカラー等" value={form.technique} onChange={e=>setForm(p=>({...p,technique:e.target.value}))}/></div>

          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {[{k:"baseLevel",lbl:"ベースレベル"},{k:"targetLevel",lbl:"ターゲットレベル"}].map(f=>(
              <div key={f.k} style={{flex:1}}><label style={s.lbl}>{f.lbl}</label>
                <select style={s.sel} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:+e.target.value}))}>
                  {[...Array(20)].map((_,i)=>{const lv=i+1;return <option key={lv} value={lv}>{lv<=13?`Lv.${lv}`:`B${lv-13}（ブリーチ ${lv-13}回）`}</option>;})}
                </select>
              </div>
            ))}
          </div>

          {/* ブリーチ */}
          <div style={{marginBottom:12}}>
            <button onClick={toggleBleach} style={{width:"100%",padding:"10px",borderRadius:8,cursor:"pointer",background:bleachOpen?"rgba(60,120,180,0.10)":"rgba(138,101,32,0.05)",border:`1px solid ${bleachOpen?"rgba(60,120,180,0.4)":"#c8b890"}`,color:bleachOpen?"#2060a0":"#6a5030",fontSize:12,fontFamily:"'Noto Sans JP',sans-serif",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>✂ ブリーチ工程を{bleachOpen?"削除":"追加"}</span>
              {form.bleach&&<span style={{fontSize:10,color:"#2060a0"}}>設定済み ✓</span>}
            </button>
            {bleachOpen&&(
              <div style={{...s.dc,borderColor:"rgba(60,120,180,0.25)",background:"rgba(60,120,180,0.04)",marginTop:8}}>
                <div style={s.lbl}>ブリーチ剤</div>
                {/* 登録済みブリーチブランドがあればボタン選択、なければ自由入力 */}
                {bleachBrands.length>0&&(
                  <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                    {bleachBrands.map(b=>(
                      <button key={b.id} onClick={()=>setNb(c=>({...c,brand:b.id,line:b.lines[0]?.name||"",shade:b.lines[0]?.shades[0]||""}))}
                        style={{flex:1,padding:"7px 4px",borderRadius:7,cursor:"pointer",fontSize:11,fontFamily:"'Noto Sans JP',sans-serif",background:nb.brand===b.id?`${b.accent}25`:"rgba(255,255,255,0.04)",border:`1px solid ${nb.brand===b.id?b.accent+"55":"rgba(255,255,255,0.1)"}`,color:nb.brand===b.id?b.accent:"rgba(232,221,208,0.65)",minWidth:0}}>
                        {b.label}
                      </button>
                    ))}
                  </div>
                )}
                {/* ブリーチ剤名・メーカー 自由入力 */}
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <div style={{flex:1.5}}>
                    <label style={s.lbl}>ブリーチ剤名</label>
                    <input style={{...s.inp,fontSize:12}} placeholder="例：FibrePlex パウダーブリーチ"
                      value={nb.brand} onChange={e=>setNb(c=>({...c,brand:e.target.value}))}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={s.lbl}>タイプ</label>
                    <input style={{...s.inp,fontSize:12}} placeholder="例：パウダー"
                      value={nb.line} onChange={e=>setNb(c=>({...c,line:e.target.value}))}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <div style={{flex:1}}><label style={s.lbl}>量(g)</label><input type="number" style={{...s.inp,padding:"8px 10px",fontSize:12}} placeholder="30" value={nb.amount} onChange={e=>setNb(c=>({...c,amount:e.target.value}))}/></div>
                  <div style={{flex:1}}><label style={s.lbl}>オキシ濃度</label>
                    <select style={s.sel} value={nb.oxi} onChange={e=>setNb(c=>({...c,oxi:e.target.value}))}>
                      {["3%","6%","9%"].map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <div style={{flex:1}}><label style={s.lbl}>オキシ量(ml)</label><input type="number" style={{...s.inp,padding:"8px 10px",fontSize:12}} placeholder="60" value={nb.oxiAmount} onChange={e=>setNb(c=>({...c,oxiAmount:e.target.value}))}/></div>
                  <div style={{flex:1}}><label style={s.lbl}>放置時間(分)</label><input type="number" style={{...s.inp,padding:"8px 10px",fontSize:12}} placeholder="40" value={nb.processingTime} onChange={e=>setNb(c=>({...c,processingTime:e.target.value}))}/></div>
                </div>
                <div style={{marginBottom:8}}><label style={s.lbl}>メモ</label><input style={{...s.inp,fontSize:12}} placeholder="回数・注意点など" value={nb.notes} onChange={e=>setNb(c=>({...c,notes:e.target.value}))}/></div>
                <button style={{width:"100%",padding:"8px",borderRadius:7,cursor:"pointer",fontSize:12,fontFamily:"'Noto Sans JP',sans-serif",background:"rgba(74,159,212,0.15)",border:"1px solid rgba(60,120,180,0.4)",color:"#2060a0"}} onClick={saveBleach}>{form.bleach?"ブリーチ設定を更新":"ブリーチ設定を保存"} ✓</button>
              </div>
            )}
          </div>

          {/* カラー剤 */}
          <div style={{...s.dc,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={s.lbl}>オンカラー</div>
              <div style={{display:"flex",gap:6}}>
                {form.colors.length>0&&(
                  <button onClick={()=>setShowCalc(true)} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:7,cursor:"pointer",border:"none",background:"rgba(138,101,32,0.12)",color:"#8a6520",fontSize:10,fontFamily:"'Noto Sans JP',sans-serif"}}>
                    ⚖ グラム計算
                  </button>
                )}
                <button onClick={()=>setShowSettings(true)} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:7,cursor:"pointer",border:"none",background:"rgba(138,101,32,0.07)",color:"#6a5030",fontSize:10,fontFamily:"'Noto Sans JP',sans-serif"}}>
                  ✎ マスタ編集
                </button>
              </div>
            </div>

            {/* 配分比率サマリー（リアルタイム） */}
            {form.colors.length>0&&(()=>{
              const tot=form.colors.reduce((s,c)=>s+(+c.ratio||1),0);
              if(!tot) return null;
              const {ratioStr,pcts}=calcRatio(form.colors.map(c=>+c.ratio||1));
              return(
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:10,padding:"7px 11px",borderRadius:8,background:"#f0ebe0",border:"1px solid #d4c9b0"}}>
                  <span style={{fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:"#8a6520"}}>配分</span>
                  {form.colors.map((c,i)=>(
                    <span key={i} style={{display:"inline-flex",alignItems:"center",gap:3}}>
                      {i>0&&<span style={{color:"#6a5030",fontSize:13}}>：</span>}
                      <Swatch shade={c.shade} brand={c.brand} size={10}/>
                      <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:16,color:swatchColor(c.shade,c.brand)}}>{+c.ratio||1}</span>
                      <span style={{fontSize:9,color:"#6a5030"}}>({pcts[i]}%)</span>
                    </span>
                  ))}
                  <span style={{marginLeft:"auto",fontFamily:"'Noto Sans JP',sans-serif",fontSize:12,color:"#9a7528"}}>=&nbsp;{ratioStr}</span>
                </div>
              );
            })()}

            {form.colors.map((c,i)=>{
              const tot=form.colors.reduce((s,cc)=>s+(+cc.ratio||1),0);
              const {pcts}=calcRatio(form.colors.map(c=>+c.ratio||1));
              const pct=pcts[i]||0;
              return(
                <div key={i} style={{marginBottom:7,padding:"8px 10px",borderRadius:9,background:`${accent(c.brand)}0d`,border:`1px solid ${accent(c.brand)}28`}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <Swatch shade={c.shade} brand={c.brand} size={16}/>
                    <div style={{flex:1,fontSize:11,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      <span style={{color:accent(c.brand)}}>{c.brand}</span>
                      <span style={{color:"#6a5030"}}> · </span>
                      <span style={{color:"#4a3420"}}>{c.shade}</span>
                    </div>
                    <span style={{fontSize:10,color:"#6a5030",marginRight:4}}>{pct}%</span>
                    <div style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}>
                      <span style={{fontSize:9,color:"#8a7058"}}>比率</span>
                      <input type="number" min={0.01} max={99} step={0.01} value={+c.ratio||1}
                        onChange={e=>setForm(f=>({...f,colors:f.colors.map((cc,j)=>j===i?{...cc,ratio:Math.max(0.01,Math.round((+e.target.value||0.01)*100)/100)}:cc)}))}
                        style={{width:52,padding:"2px 5px",textAlign:"center",fontSize:18,fontFamily:"'Noto Sans JP',sans-serif",color:"#8a6520",background:"rgba(138,101,32,0.06)",border:"1px solid rgba(138,101,32,0.4)",borderRadius:6,outline:"none"}}/>
                    </div>
                    <span style={{cursor:"pointer",color:"rgba(210,70,70,0.5)",fontSize:14,flexShrink:0}} onClick={()=>setForm(f=>({...f,colors:f.colors.filter((_,j)=>j!==i)}))}>×</span>
                  </div>
                </div>
              );
            })}

            {/* 入力モード切替 */}
            <div style={{display:"flex",gap:0,marginTop:10,marginBottom:10,borderRadius:7,overflow:"hidden",border:"1px solid #d0c4a8"}}>
              {["preset","free"].map(mode=>(
                <button key={mode} onClick={()=>setNcMode(mode)} style={{flex:1,padding:"6px",border:"none",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,background:ncMode===mode?"rgba(201,168,76,0.65)":"rgba(255,255,255,0.03)",color:ncMode===mode?"#8a6520":"rgba(232,221,208,0.65)"}}>
                  {mode==="preset"?"プリセットから選択":"手動入力"}
                </button>
              ))}
            </div>

            {ncMode==="preset"&&<>
              {/* ブランド選択 */}
              <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
                {colorBrands.map(b=>(
                  <button key={b.id} onClick={()=>setNc(c=>({...c,brand:b.id,line:b.lines[0]?.name||"",shade:"",ratio:c.ratio||1}))}
                    style={{flex:1,padding:"6px 4px",borderRadius:7,cursor:"pointer",fontSize:11,fontFamily:"'Noto Sans JP',sans-serif",background:nc.brand===b.id?`${b.accent}25`:"rgba(255,255,255,0.04)",border:`1px solid ${nc.brand===b.id?b.accent+"55":"rgba(255,255,255,0.1)"}`,color:nc.brand===b.id?b.accent:"rgba(232,221,208,0.65)",minWidth:0}}>
                    {b.label}
                  </button>
                ))}
              </div>
              {/* ライン */}
              <div style={{marginBottom:8}}><label style={s.lbl}>ライン</label>
                <select style={s.sel} value={nc.line} onChange={e=>setNc(c=>({...c,line:e.target.value,shade:"",ratio:c.ratio||1}))}>
                  <option value="">ラインを選択</option>
                  {getLinesOf(nc.brand).map(l=><option key={l.name} value={l.name}>{l.name}</option>)}
                </select>
              </div>
              {/* 色番号 */}
              <div style={{marginBottom:8}}><label style={s.lbl}>色番号</label>
                <select style={s.sel} value={nc.shade} onChange={e=>setNc(c=>({...c,shade:e.target.value}))}>
                  <option value="">色番号を選択</option>
                  {getShadesOf(nc.brand,nc.line).map(sh=><option key={sh} value={sh}>{sh}</option>)}
                </select>
              </div>
            </>}

            {ncMode==="free"&&<>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1.2}}>
                  <label style={s.lbl}>メーカー名</label>
                  <input style={{...s.inp,fontSize:12}} placeholder="例：edol" value={nc.brand} onChange={e=>setNc(c=>({...c,brand:e.target.value}))}/>
                </div>
                <div style={{flex:1.5}}>
                  <label style={s.lbl}>ライン名</label>
                  <input style={{...s.inp,fontSize:12}} placeholder="例：シェードカラー" value={nc.line} onChange={e=>setNc(c=>({...c,line:e.target.value}))}/>
                </div>
              </div>
              <div style={{marginBottom:8}}>
                <label style={s.lbl}>色番号</label>
                <input style={{...s.inp,fontSize:12}} placeholder="例：A9、V7、YY-Pink など自由に入力" value={nc.shade} onChange={e=>setNc(c=>({...c,shade:e.target.value}))}/>
              </div>
            </>}

            {/* 比率入力（共通） */}
            {nc.shade&&(
              <div style={{padding:"10px 12px",borderRadius:9,background:"#f0ebe0",border:"1px solid #d0c4a8",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <Swatch shade={nc.shade} brand={nc.brand} size={22}/>
                  <span style={{fontSize:13,color:"#2c2416",flex:1}}>{nc.shade}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <label style={{...s.lbl,margin:0,whiteSpace:"nowrap"}}>配分比率</label>
                  <input type="range" min={0.01} max={20} step={0.01} value={Math.min(+nc.ratio||0.01,20)}
                    onChange={e=>setNc(c=>({...c,ratio:Math.round(+e.target.value*100)/100}))}
                    style={{flex:1,accentColor:swatchColor(nc.shade,nc.brand)}}/>
                  <input type="number" min={0.01} max={99} step={0.01} value={+nc.ratio||1}
                    onChange={e=>setNc(c=>({...c,ratio:Math.max(0.01,Math.round((+e.target.value||0.01)*100)/100)}))}
                    style={{width:52,padding:"4px 6px",textAlign:"center",fontSize:20,fontFamily:"'Noto Sans JP',sans-serif",color:"#8a6520",background:"rgba(138,101,32,0.06)",border:"1px solid rgba(138,101,32,0.4)",borderRadius:7,outline:"none"}}/>
                </div>
              </div>
            )}
            <button style={{width:"100%",padding:"9px",borderRadius:7,cursor:"pointer",background:`${accent(nc.brand)}18`,border:`1px solid ${accent(nc.brand)}45`,color:accent(nc.brand),fontSize:12,fontFamily:"'Noto Sans JP',sans-serif"}} onClick={addColor}>＋ カラー剤を追加</button>
          </div>

          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <div style={{flex:1.5}}><label style={s.lbl}>オキシ濃度</label>
              <select style={s.sel} value={form.developer} onChange={e=>setForm(p=>({...p,developer:e.target.value}))}>
                {["2%","3%","6%","9%","なし（塩基性）"].map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            {form.developer!=="なし（塩基性）"&&<div style={{flex:1}}><label style={s.lbl}>オキシ量(ml)</label><input type="number" style={s.inp} value={form.developerAmount} onChange={e=>setForm(p=>({...p,developerAmount:+e.target.value}))}/></div>}
            <div style={{flex:1}}><label style={s.lbl}>放置時間(分)</label><input type="number" style={s.inp} value={form.processingTime} onChange={e=>setForm(p=>({...p,processingTime:+e.target.value}))}/></div>
          </div>

          <div style={{marginBottom:12}}>
            <label style={s.lbl}>タグ</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>{form.tags.map(t=><Tag key={t} label={t} onRemove={()=>setForm(f=>({...f,tags:f.tags.filter(x=>x!==t)}))}/>)}</div>
            <div style={{display:"flex",gap:6}}>
              <input style={{...s.inp,flex:1}} placeholder="例：アッシュ、yoyo、ブリーチあり" value={newTagVal} onChange={e=>setNewTagVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTag2()}/>
              <button style={s.act} onClick={addTag2}>追加</button>
            </div>
          </div>

          {/* Before / After 画像 */}
          <div style={{...s.dc,marginBottom:12}}>
            <div style={s.lbl}>After 写真（2枚まで）</div>
            <ImagePanel
              imgAfter1={form.imgAfter1}
              imgAfter2={form.imgAfter2}
              onChangeAfter1={v=>setForm(p=>({...p,imgAfter1:v}))}
              onChangeAfter2={v=>setForm(p=>({...p,imgAfter2:v}))}
            />
          </div>

          <div style={{marginBottom:12}}><label style={s.lbl}>メモ</label><textarea rows={3} style={{...s.inp,resize:"vertical",lineHeight:1.8}} placeholder="施術のポイント・次回引き継ぎなど" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/></div>
          <div style={{marginBottom:22}}><label style={s.lbl}>仕上がり評価</label><Stars value={form.stars||0} onChange={v=>setForm(p=>({...p,stars:v}))}/></div>
          <button style={{...s.addBtn,marginBottom:0}} onClick={save}>保存する</button>
        </>}
      </div>

        {view==="tips"&&<TipsView/>}
        {view==="data"&&<DataManagementView/>}

      {/* BOTTOM TAB */}
      {(view==="list"||view==="category"||view==="tips"||view==="data")&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(247,243,236,0.97)",borderTop:"1px solid rgba(201,168,76,0.65)",display:"flex",zIndex:200,backdropFilter:"blur(12px)"}}>
          {tabs.map(tab=>(
            <button key={tab.id} onClick={()=>setView(tab.id)} style={{flex:1,padding:"12px 0 10px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:activeTab===tab.id?"#7a5818":"#9a8060",fontFamily:"'Noto Sans JP',sans-serif",transition:"color .15s"}}>
              <span style={{fontSize:18}}>{tab.icon}</span>
              <span style={{fontSize:10,letterSpacing:"0.08em"}}>{tab.label}</span>
              {activeTab===tab.id&&<div style={{width:20,height:2,borderRadius:1,background:"#8a6520",marginTop:1}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}
// マウント
const _root = document.getElementById('root');
if (_root) {
  ReactDOM.createRoot(_root).render(React.createElement(App));
  setTimeout(() => {
    const s = document.getElementById('splash');
    if (s) { s.classList.add('fade-out'); setTimeout(() => s.remove(), 400); }
  }, 600);
}
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      const h = location.hostname;
      if (h === 'localhost' || h.endsWith('github.io') || h.endsWith('netlify.app')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    }
  </script>
</body>
</html>
